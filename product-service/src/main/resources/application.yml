spring:
    application:
        name: product-service
    data:
        mongodb:
          uri: mongodb://localhost:27017
          database: product_db
          auto-index-creation: true

eureka:
  instance:
    prefer-ip-address: true
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/
